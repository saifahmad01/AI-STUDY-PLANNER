# App name
spring.application.name=study-planner

# Database connection (PostgresSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/study planner
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgresSQLDialect

# Flyway (auto-runs migration scripts on startup)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT secret (change this in production!)
app.jwt.secret=my-super-secret-key-for-study-planner-app-2024
app.jwt.expiration=86400000

# AI API Key (replace with your key)
app.ai.api-key=your-openai-or-anthropic-key-here

# Server port
server.port=8080