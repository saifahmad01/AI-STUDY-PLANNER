spring:
  application:
    name: study-planner

  datasource:
    url: jdbc:postgresql://localhost:5432/study_planner
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # dialect line removed - Hibernate 6 auto-detects it

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: my-super-secret-key-for-study-planner-app-2024
    expiration: 86400000
  ai:
    api-key: your-openai-or-anthropic-key-here

server:
  port: 8080